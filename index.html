<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluid Simulation v1.0 - Hand Tracking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #mainCanvas { display: block; }
    
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,10,20,0.9);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 15px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      min-width: 260px;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 100;
    }
    
    .accordion { margin-bottom: 10px; border: 1px solid rgba(0,255,255,0.3); border-radius: 4px; }
    .accordion-header { background: rgba(0,80,100,0.5); padding: 8px; cursor: pointer; display: flex; justify-content: space-between; }
    .accordion-header::after { content: '▼'; font-size: 10px; }
    .accordion-header.collapsed::after { content: '▶'; }
    .accordion-content { padding: 10px; }
    .accordion-content.collapsed { display: none; }
    
    .control-group { margin-bottom: 8px; }
    .control-group label { display: block; margin-bottom: 3px; color: #fff; font-size: 11px; }
    .control-group input[type="range"] { width: 100%; }
    .control-group input[type="color"] { width: 100%; height: 28px; border: none; border-radius: 4px; }
    
    button { background: #0ff; color: #000; border: none; padding: 8px 16px; font-family: monospace; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 8px; width: 100%; }
    button:disabled { background: #666; color: #999; cursor: not-allowed; }
    
    #cameraPreview { width: 150px; height: 150px; border: 1px solid #0ff; display: none; margin: 10px auto; }
    #cameraCanvas { width: 100%; height: 100%; }
    
    #handPos { margin-top: 8px; color: #ff0; font-size: 11px; text-align: center; }
    #status { margin-top: 10px; padding-top: 10px; border-top: 1px solid #0ff; color: #fff; font-size: 11px; }
    
    #loadingStatus { color: #ff0; font-size: 11px; margin-bottom: 8px; text-align: center; }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #0ff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .toggle-container { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
    .toggle-switch { position: relative; width: 40px; height: 20px; background: #333; border-radius: 10px; transition: background 0.3s; }
    .toggle-switch.active { background: #0f0; }
    .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.3s; }
    .toggle-switch.active::after { transform: translateX(20px); }
    
    .color-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .color-row label { flex: 1; font-size: 10px; }
    
    /* Sub-accordion styles from v0.41 */
    .sub-accordion {
      margin: 6px 0;
      border-left: 2px solid rgba(0, 255, 255, 0.3);
      padding-left: 8px;
    }
    .sub-header {
      font-size: 11px;
      color: #0ff;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0.8;
    }
    .sub-header:hover { opacity: 1; }
    .sub-header::after { content: '▼'; font-size: 8px; }
    .sub-header.collapsed::after { content: '▶'; }
    .sub-content { display: block; padding: 4px 0 4px 8px; }
    .sub-content.collapsed { display: none; }
    .sub-control { margin-bottom: 6px; }
    .sub-control label {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 2px;
      display: block;
    }
    .sub-control input[type="range"] { width: 100%; height: 12px; }
    .sub-control select {
      width: 100%;
      padding: 3px 6px;
      background: rgba(0, 0, 0, 0.5);
      color: #0ff;
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 3px;
      font-size: 10px;
    }
    
    /* Color dots grid */
    .color-grid {
      display: flex;
      gap: 6px;
      margin: 6px 0;
    }
    .color-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .color-dot:hover { transform: scale(1.1); border-color: #0ff; }
    .color-dot.active { border-color: #0ff; box-shadow: 0 0 8px rgba(0, 255, 255, 0.5); }
    .color-dot.hidden { display: none; }
    
    /* HSV Panel */
    .hsv-panel {
      display: none;
      padding: 8px;
      background: rgba(0, 30, 40, 0.8);
      border-radius: 4px;
      margin-top: 8px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    .hsv-panel.show { display: block; }
    .hsv-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .hsv-row:last-child { margin-bottom: 0; }
    .hsv-row span {
      width: 16px;
      font-size: 10px;
      color: #0ff;
      text-align: center;
    }
    .hsv-row input[type="range"] {
      flex: 1;
      height: 14px;
    }
    
    #version { position: absolute; bottom: 10px; right: 10px; color: #0ff; font-size: 11px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 3px; z-index: 100; }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>
  
  <div id="controls">
    <div id="loadingStatus"><span class="spinner"></span>Loading...</div>
    
    <div class="accordion">
      <div class="accordion-header" data-target="inputPanel">Input Mode</div>
      <div class="accordion-content" id="inputPanel">
        <div class="toggle-container" id="cameraToggleContainer">
          <div class="toggle-switch" id="cameraToggle"></div>
          <span>Camera Hand Tracking</span>
        </div>
        <div id="cameraPreview"><canvas id="cameraCanvas" width="150" height="150"></canvas></div>
        <div id="handPos">Hand: --</div>
        <div style="margin-top:8px; color:#888; font-size:10px;">Mouse: always active<br>Camera: overrides when detected</div>
      </div>
    </div>
    
    <!-- Physics Panel -->
    <div class="accordion">
      <div class="accordion-header collapsed" data-target="physicsPanel">Physics</div>
      <div class="accordion-content collapsed" id="physicsPanel">
        <div class="control-group"><label>Viscosity: <span id="viscosityVal">0.25</span></label><input type="range" id="viscosity" min="0.05" max="0.5" step="0.05" value="0.25"></div>
        <div class="control-group"><label>Mouse Force: <span id="forceVal">4.0</span></label><input type="range" id="mouseForce" min="1" max="10" step="0.5" value="4.0"></div>
      </div>
    </div>
    
    <!-- Visual Panel with sub-accordions -->
    <div class="accordion">
      <div class="accordion-header collapsed" data-target="visualPanel">Visual</div>
      <div class="accordion-content collapsed" id="visualPanel">
        <div class="control-group"><label>Density: <span id="densityVal">2.6</span>x</label><input type="range" id="density" min="0.5" max="5" step="0.1" value="2.6"></div>
        <div class="control-group"><label>Particle Size: <span id="sizeVal">1.4</span></label><input type="range" id="particleSize" min="0.5" max="3" step="0.1" value="1.4"></div>
        
        <!-- Colors Sub-accordion -->
        <div class="sub-accordion">
          <div class="sub-header collapsed" data-sub="colorsSub">Colors</div>
          <div class="sub-content collapsed" id="colorsSub">
            <div class="sub-control">
              <label>Layers: <span id="colorLayersVal">4</span></label>
              <input type="range" id="colorLayers" min="1" max="4" value="4" step="1">
            </div>
            <div class="color-grid">
              <div class="color-dot active" id="colorDot1" style="background: #00ffff;" title="Color 1 (Edge)"></div>
              <div class="color-dot" id="colorDot2" style="background: #ff00ff;" title="Color 2"></div>
              <div class="color-dot" id="colorDot3" style="background: #ffff00;" title="Color 3"></div>
              <div class="color-dot" id="colorDot4" style="background: #00ff00;" title="Color 4 (Center)"></div>
            </div>
            <div class="hsv-panel" id="hsvPanel">
              <div class="hsv-row"><span>H</span><input type="range" id="hsvH" min="0" max="360" value="180"></div>
              <div class="hsv-row"><span>S</span><input type="range" id="hsvS" min="0" max="100" value="100"></div>
              <div class="hsv-row"><span>V</span><input type="range" id="hsvV" min="0" max="100" value="100"></div>
            </div>
          </div>
        </div>
        
        <!-- Random Sub-accordion -->
        <div class="sub-accordion">
          <div class="sub-header collapsed" data-sub="randomSub">Random</div>
          <div class="sub-content collapsed" id="randomSub">
            <div class="sub-control">
              <label>Algorithm</label>
              <select id="randomAlgo">
                <option value="none">None</option>
                <option value="perlin" selected>Perlin Noise</option>
                <option value="simplex">Simplex Noise</option>
                <option value="white">White Noise</option>
              </select>
            </div>
            <div class="sub-control">
              <label>Scale: <span id="randomScaleVal">1.4</span></label>
              <input type="range" id="randomScale" min="0.1" max="3.0" value="1.4" step="0.1">
            </div>
            <div class="sub-control">
              <label>Intensity: <span id="randomIntensityVal">0.70</span></label>
              <input type="range" id="randomIntensity" min="0" max="1.0" value="0.70" step="0.05">
            </div>
          </div>
        </div>
        
      </div>
    </div>
    
    <div id="status">FPS: <span id="fps">--</span> | Particles: <span id="pcount">--</span></div>
  </div>
  
  <div id="version">v1.2 - Enhanced Visuals</div>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js"></script>
  
  <script>
    // ============================================
    // FLUID SIMULATION (SPH-based)
    // ============================================
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    const BASE_PARTICLES = 300;
    let mouseX = 0, mouseY = 0;
    let isMouseDown = false;
    
    // Physics Constants
    const INTERACTION_RADIUS = 150;      // Hand/mouse influence radius
    const INTERACTION_MIN_DIST = 1;      // Minimum distance for force calculation
    const PARTICLE_REPULSION_RADIUS = 20; // Particle-particle repulsion radius
    const PARTICLE_REPULSION_FORCE = 0.5;
    const BOUNCE_DAMPING = 0.8;          // Wall bounce velocity retention
    const VISCOSITY_SCALE = 0.1;         // Viscosity multiplier
    
    // Parameters (aligned with v0.41)
    let params = {
      density: 2.6,
      particleSize: 1.4,
      viscosity: 0.25,
      mouseForce: 4.0,
      colors: ['#00ffff', '#ff00ff', '#ffff00', '#00ff00'],
      colorLayers: 4,
      randomAlgo: 'perlin',
      randomScale: 1.4,
      randomIntensity: 0.70
    };
    
    // Active color index for HSV editing (1-4)
    let activeColorIndex = 1;
    
    // ============================================
    // NOISE FUNCTIONS (from v0.41)
    // ============================================
    function noise(x, y, seed = 0) {
      const n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
      return n - Math.floor(n);
    }
    
    function perlinNoise(x, y, scale = 1) {
      const X = Math.floor(x * scale);
      const Y = Math.floor(y * scale);
      const fx = (x * scale) - X;
      const fy = (y * scale) - Y;
      
      const n00 = noise(X, Y);
      const n10 = noise(X + 1, Y);
      const n01 = noise(X, Y + 1);
      const n11 = noise(X + 1, Y + 1);
      
      const u = fx * fx * (3 - 2 * fx);
      const v = fy * fy * (3 - 2 * fy);
      
      return (1 - u) * (1 - v) * n00 + u * (1 - v) * n10 + (1 - u) * v * n01 + u * v * n11;
    }
    
    function simplexNoise(x, y, scale = 1) {
      // Simplified Simplex using Perlin
      return perlinNoise(x, y, scale);
    }
    
    function getNoiseValue(x, y, algo, scale) {
      switch (algo) {
        case 'perlin': return perlinNoise(x, y, scale);
        case 'simplex': return simplexNoise(x, y, scale);
        case 'white': return noise(x * scale, y * scale);
        default: return 0.5;
      }
    }
    
    // ============================================
    // HSV COLOR UTILITIES
    // ============================================
    function hsvToHex(h, s, v) {
      s /= 100;
      v /= 100;
      const c = v * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = v - c;
      let r, g, b;
      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];
      const toHex = (n) => Math.round((n + m) * 255).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }
    
    function hexToHsv(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const d = max - min;
      let h = 0, s = max === 0 ? 0 : d / max, v = max;
      if (d !== 0) {
        if (max === r) h = ((g - b) / d + 6) % 6;
        else if (max === g) h = (b - r) / d + 2;
        else h = (r - g) / d + 4;
        h *= 60;
      }
      return { h: Math.round(h), s: Math.round(s * 100), v: Math.round(v * 100) };
    }
    
    // ============================================
    // DYNAMIC SPATIAL GRID (for particle interaction)
    // ============================================
    class SpatialGrid {
      constructor() {
        this.cellSize = PARTICLE_REPULSION_RADIUS * 2; // Default 40px
        this.cols = 0;
        this.rows = 0;
        this.cells = [];
        this.particleCount = 0; // Track for stats
      }
      
      // Calculate optimal cell size based on particle distribution
      calculateOptimalCellSize() {
        if (particles.length === 0) return PARTICLE_REPULSION_RADIUS * 2;
        
        // Find bounding box of particles
        let minX = width, maxX = 0;
        let minY = height, maxY = 0;
        
        for (const p of particles) {
          minX = Math.min(minX, p.x);
          maxX = Math.max(maxX, p.x);
          minY = Math.min(minY, p.y);
          maxY = Math.max(maxY, p.y);
        }
        
        // Calculate coverage area
        const coverageWidth = maxX - minX;
        const coverageHeight = maxY - minY;
        const coverageArea = coverageWidth * coverageHeight;
        const screenArea = width * height;
        const coverage = coverageArea / screenArea;
        
        // If particles are clustered (< 40% coverage), use smaller cells
        // If spread out, use larger cells
        if (coverage < 0.2) {
          // Highly clustered - use smaller cells for better precision
          return Math.max(20, PARTICLE_REPULSION_RADIUS * 1.5);
        } else if (coverage > 0.7) {
          // Spread out - use larger cells
          return PARTICLE_REPULSION_RADIUS * 3;
        }
        // Normal distribution
        return PARTICLE_REPULSION_RADIUS * 2;
      }
      
      rebuild() {
        // Recalculate optimal cell size every 10 frames
        if (!this.lastRebuild || performance.now() - this.lastRebuild > 160) {
          this.cellSize = this.calculateOptimalCellSize();
          this.lastRebuild = performance.now();
        }
        
        this.cols = Math.ceil(width / this.cellSize);
        this.rows = Math.ceil(height / this.cellSize);
        
        // Clear and resize cells array
        const cellCount = this.cols * this.rows;
        if (this.cells.length !== cellCount) {
          this.cells = new Array(cellCount);
          for (let i = 0; i < cellCount; i++) {
            this.cells[i] = [];
          }
        } else {
          // Clear existing cells
          for (let i = 0; i < cellCount; i++) {
            this.cells[i].length = 0;
          }
        }
        
        // Insert particles into grid
        this.particleCount = 0;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const col = Math.floor(p.x / this.cellSize);
          const row = Math.floor(p.y / this.cellSize);
          
          // Clamp to valid range
          if (col >= 0 && col < this.cols && row >= 0 && row < this.rows) {
            const cellIndex = row * this.cols + col;
            this.cells[cellIndex].push(i);
            this.particleCount++;
          }
        }
      }
      
      // Query neighboring cells for a particle
      queryNeighbors(particleIndex, callback) {
        const p = particles[particleIndex];
        const col = Math.floor(p.x / this.cellSize);
        const row = Math.floor(p.y / this.cellSize);
        
        // Check 3x3 neighborhood
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const nc = col + dx;
            const nr = row + dy;
            
            if (nc >= 0 && nc < this.cols && nr >= 0 && nr < this.rows) {
              const cellIndex = nr * this.cols + nc;
              const cell = this.cells[cellIndex];
              
              for (const otherIndex of cell) {
                if (otherIndex !== particleIndex) {
                  callback(otherIndex);
                }
              }
            }
          }
        }
      }
    }
    
    // Create global grid instance
    const spatialGrid = new SpatialGrid();
    
    // Debounced resize handler
    let resizeTimeout;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(resize, 100);
    });
    resize();
    
    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = 0;
        this.vy = 0;
        this.radius = 8;
        this.color = Math.floor(Math.random() * params.colors.length);
      }
      
      update(particleIndex) {
        // Hand/Mouse interaction
        let targetX, targetY, isActive;
        
        if (handTracking.isDetected) {
          // Use hand position
          targetX = handTracking.x * width;
          targetY = handTracking.y * height;
          isActive = true;
        } else if (isMouseDown) {
          // Use mouse position
          targetX = mouseX;
          targetY = mouseY;
          isActive = true;
        } else {
          isActive = false;
        }
        
        if (isActive) {
          const dx = targetX - this.x;
          const dy = targetY - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < INTERACTION_RADIUS && dist > INTERACTION_MIN_DIST) {
            const force = (INTERACTION_RADIUS - dist) / INTERACTION_RADIUS * params.mouseForce;
            this.vx += (dx / dist) * force;
            this.vy += (dy / dist) * force;
          }
        }
        
        // Particle-particle interaction using spatial grid (only check neighbors)
        spatialGrid.queryNeighbors(particleIndex, (otherIndex) => {
          const pj = particles[otherIndex];
          const dx = this.x - pj.x;
          const dy = this.y - pj.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < PARTICLE_REPULSION_RADIUS && dist > 0.1) {
            const force = (PARTICLE_REPULSION_RADIUS - dist) / PARTICLE_REPULSION_RADIUS * PARTICLE_REPULSION_FORCE;
            this.vx += (dx / dist) * force * 0.1;
            this.vy += (dy / dist) * force * 0.1;
          }
        });
        
        // Viscosity
        this.vx *= (1 - params.viscosity * VISCOSITY_SCALE);
        this.vy *= (1 - params.viscosity * VISCOSITY_SCALE);
        
        // Update position
        this.x += this.vx;
        this.y += this.vy;
        
        // Boundary with damping
        if (this.x < 0 || this.x > width) { 
          this.vx *= -BOUNCE_DAMPING; 
          this.x = Math.max(0, Math.min(width, this.x)); 
        }
        if (this.y < 0 || this.y > height) { 
          this.vy *= -BOUNCE_DAMPING; 
          this.y = Math.max(0, Math.min(height, this.y)); 
        }
      }
      
      draw() {
        const size = this.radius * params.particleSize;
        
        // Apply noise to size if enabled
        let finalSize = size;
        if (params.randomAlgo !== 'none') {
          const n = getNoiseValue(this.x * 0.01, this.y * 0.01, params.randomAlgo, params.randomScale);
          const variation = (n - 0.5) * 2 * params.randomIntensity;
          finalSize = size * (1 + variation);
        }
        
        // Multi-layer color gradient based on colorLayers setting
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, finalSize);
        
        // Determine which color to use based on layer index
        const layerIndex = this.color % params.colorLayers;
        const color = params.colors[layerIndex];
        
        gradient.addColorStop(0, color);
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, finalSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // Initialize or resize particle array (preserves existing particles)
    function initParticles() {
      const newCount = Math.floor(BASE_PARTICLES * params.density);
      const oldCount = particles.length;
      
      if (newCount > oldCount) {
        // Add new particles
        for (let i = oldCount; i < newCount; i++) {
          particles.push(new Particle());
        }
      } else if (newCount < oldCount) {
        // Remove excess particles
        particles.splice(newCount);
      }
      // If same count, do nothing (preserves positions)
    }
    initParticles();
    
    // ============================================
    // HAND TRACKING (TensorFlow.js Handpose)
    // ============================================
    const video = document.createElement('video');
    video.setAttribute('playsinline', '');
    video.setAttribute('muted', '');
    video.style.display = 'none';
    document.body.appendChild(video);
    
    const cameraCanvas = document.getElementById('cameraCanvas');
    const cameraCtx = cameraCanvas.getContext('2d');
    const cameraToggle = document.getElementById('cameraToggle');
    const cameraToggleContainer = document.getElementById('cameraToggleContainer');
    const cameraPreview = document.getElementById('cameraPreview');
    const handPos = document.getElementById('handPos');
    const loadingStatus = document.getElementById('loadingStatus');
    
    let handModel = null;
    let isCameraRunning = false;
    let rafId = null;
    
    // Hand tracking state (from v0.63)
    let handTracking = {
      x: 0.5,
      y: 0.5,
      isDetected: false,
      lastX: 0.5,
      lastY: 0.5,
      missCount: 0
    };
    
    const SMOOTH_FACTOR = 0.3;
    const MISS_THRESHOLD = 5;
    
    async function initHandTracking() {
      loadingStatus.innerHTML = '<span class="spinner"></span>Loading model...';
      
      try {
        await new Promise(r => setTimeout(r, 500)); // Wait for CDN
        
        if (typeof tf === 'undefined') {
          throw new Error('TensorFlow.js not loaded from CDN');
        }
        if (typeof handpose === 'undefined') {
          throw new Error('Handpose model not loaded from CDN');
        }
        
        handModel = await handpose.load();
        loadingStatus.innerHTML = '✓ Model ready';
        loadingStatus.style.color = '#0f0';
        cameraToggleContainer.style.opacity = '1';
        
      } catch (err) {
        console.error('Hand tracking init failed:', err);
        loadingStatus.innerHTML = '✗ Failed: ' + (err.message || 'Unknown error');
        loadingStatus.style.color = '#f00';
        cameraToggleContainer.style.opacity = '0.5';
        cameraToggleContainer.style.cursor = 'not-allowed';
      }
    }
    
    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 480, height: 480 },
          audio: false
        });
        video.srcObject = stream;
        return new Promise((resolve, reject) => {
          video.onloadedmetadata = () => resolve(video);
          video.onerror = (err) => reject(new Error('Video load error: ' + err.message));
          setTimeout(() => reject(new Error('Video load timeout')), 5000);
        });
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          throw new Error('Camera permission denied');
        } else if (err.name === 'NotFoundError') {
          throw new Error('No camera found');
        }
        throw err;
      }
    }
    
    // Frame skipping for gesture detection (30fps instead of 60fps)
    let gestureFrameSkip = 0;
    const GESTURE_SKIP_INTERVAL = 2; // Run every 2nd frame = 30fps at 60hz display
    
    async function detectHands(timestamp) {
      if (!isCameraRunning || !handModel) {
        rafId = null;
        return;
      }
      
      // Frame skipping to reduce GPU load
      gestureFrameSkip++;
      if (gestureFrameSkip < GESTURE_SKIP_INTERVAL) {
        rafId = requestAnimationFrame(detectHands);
        return;
      }
      gestureFrameSkip = 0;
      
      // Safety check: ensure video dimensions are valid
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        console.warn('Video dimensions not ready yet');
        rafId = requestAnimationFrame(detectHands);
        return;
      }
      
      // Draw mirrored video
      cameraCtx.save();
      cameraCtx.scale(-1, 1);
      cameraCtx.translate(-cameraCanvas.width, 0);
      cameraCtx.drawImage(video, 0, 0, cameraCanvas.width, cameraCanvas.height);
      cameraCtx.restore();
      
      try {
        const predictions = await handModel.estimateHands(video);
        let targetX = handTracking.lastX;
        let targetY = handTracking.lastY;
        let detected = false;
        
        if (predictions.length > 0) {
          const landmarks = predictions[0].landmarks;
          const palmBase = landmarks[0];
          
          // Mirror X coordinate (with safety check)
          targetX = 1 - (palmBase[0] / video.videoWidth);
          targetY = palmBase[1] / video.videoHeight;
          detected = true;
          handTracking.missCount = 0;
          
          // Draw landmarks
          cameraCtx.fillStyle = '#00ff00';
          for (let i = 0; i < landmarks.length; i++) {
            const x = landmarks[i][0] * (cameraCanvas.width / video.videoWidth);
            const y = landmarks[i][1] * (cameraCanvas.height / video.videoHeight);
            cameraCtx.beginPath();
            cameraCtx.arc(cameraCanvas.width - x, y, 2, 0, 2 * Math.PI);
            cameraCtx.fill();
          }
        } else {
          handTracking.missCount++;
        }
        
        // Debounce
        if (detected) {
          handTracking.isDetected = true;
        } else if (handTracking.missCount > MISS_THRESHOLD) {
          handTracking.isDetected = false;
        }
        
        // Smoothing
        if (handTracking.isDetected) {
          handTracking.lastX = handTracking.lastX * (1 - SMOOTH_FACTOR) + targetX * SMOOTH_FACTOR;
          handTracking.lastY = handTracking.lastY * (1 - SMOOTH_FACTOR) + targetY * SMOOTH_FACTOR;
          handTracking.x = handTracking.lastX;
          handTracking.y = handTracking.lastY;
          
          handPos.textContent = `Hand: ${Math.round(handTracking.x * 100)}%, ${Math.round(handTracking.y * 100)}%`;
          handPos.style.color = '#0f0';
        } else {
          handPos.textContent = 'Hand: --';
          handPos.style.color = '#ff0';
        }
      } catch (err) {
        console.error('Hand detection error:', err);
      }
      
      if (isCameraRunning) {
        rafId = requestAnimationFrame(detectHands);
      } else {
        rafId = null;
      }
    }
    
    async function startCamera() {
      if (isCameraRunning) return; // Prevent double start
      
      try {
        await setupCamera();
        await video.play();
        cameraPreview.style.display = 'block';
        isCameraRunning = true;
        cameraToggle.classList.add('active');
        detectHands();
      } catch (err) {
        console.error('Camera start failed:', err);
        alert('Camera error: ' + err.message);
        stopCamera(); // Ensure cleanup
      }
    }
    
    function stopCamera() {
      if (!isCameraRunning && rafId === null) return; // Already stopped
      
      isCameraRunning = false;
      
      // Cancel RAF
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      
      // Stop video tracks
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
      
      // Pause video element
      video.pause();
      
      // Clear canvas
      cameraCtx.clearRect(0, 0, cameraCanvas.width, cameraCanvas.height);
      
      cameraPreview.style.display = 'none';
      cameraToggle.classList.remove('active');
      handTracking.isDetected = false;
      handTracking.missCount = 0;
      handPos.textContent = 'Hand: --';
    }
    
    cameraToggleContainer.addEventListener('click', () => {
      if (!handModel) {
        console.warn('Camera toggle clicked but model not ready');
        return;
      }
      if (isCameraRunning) {
        stopCamera();
      } else {
        startCamera();
      }
    });
    
    // ============================================
    // UI CONTROLS
    // ============================================
    document.querySelectorAll('.accordion-header').forEach(header => {
      header.addEventListener('click', () => {
        const target = document.getElementById(header.dataset.target);
        header.classList.toggle('collapsed');
        target.classList.toggle('collapsed');
      });
    });
    
    // Helper for safe number parsing
    function safeParseFloat(value, defaultValue, min, max) {
      const parsed = parseFloat(value);
      if (isNaN(parsed)) return defaultValue;
      return Math.max(min, Math.min(max, parsed));
    }
    
    document.getElementById('density').addEventListener('input', (e) => {
      params.density = safeParseFloat(e.target.value, 2.6, 0.5, 5.0);
      document.getElementById('densityVal').textContent = params.density.toFixed(1);
      initParticles();
    });
    
    document.getElementById('particleSize').addEventListener('input', (e) => {
      params.particleSize = safeParseFloat(e.target.value, 1.4, 0.5, 3.0);
      document.getElementById('sizeVal').textContent = params.particleSize.toFixed(1);
    });
    
    document.getElementById('viscosity').addEventListener('input', (e) => {
      params.viscosity = safeParseFloat(e.target.value, 0.25, 0.05, 0.5);
      document.getElementById('viscosityVal').textContent = params.viscosity.toFixed(2);
    });
    
    document.getElementById('mouseForce').addEventListener('input', (e) => {
      params.mouseForce = safeParseFloat(e.target.value, 4.0, 1.0, 10.0);
      document.getElementById('forceVal').textContent = params.mouseForce.toFixed(1);
    });
    
    // ============================================
    // SUB-ACCORDION CONTROLS
    // ============================================
    document.querySelectorAll('.sub-header').forEach(header => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        const target = header.dataset.sub;
        const content = document.getElementById(target);
        header.classList.toggle('collapsed');
        content?.classList.toggle('collapsed');
      });
    });
    
    // ============================================
    // COLOR LAYERS CONTROL
    // ============================================
    function updateColorLayers() {
      const layers = params.colorLayers;
      document.getElementById('colorLayersVal').textContent = layers;
      
      // Show/hide color dots based on layer count
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById(`colorDot${i}`);
        if (dot) {
          dot.style.display = i <= layers ? 'block' : 'none';
          if (i > layers) dot.classList.remove('active');
        }
      }
      
      // Update active color index if it's now hidden
      if (activeColorIndex > layers) {
        activeColorIndex = 1;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById('colorDot1')?.classList.add('active');
        updateHSVPanel();
      }
    }
    
    document.getElementById('colorLayers').addEventListener('input', (e) => {
      params.colorLayers = parseInt(e.target.value);
      updateColorLayers();
    });
    
    // ============================================
    // COLOR DOTS & HSV PANEL
    // ============================================
    const colorDots = [1, 2, 3, 4].map(i => document.getElementById(`colorDot${i}`));
    const hsvPanel = document.getElementById('hsvPanel');
    const hsvH = document.getElementById('hsvH');
    const hsvS = document.getElementById('hsvS');
    const hsvV = document.getElementById('hsvV');
    
    function updateHSVPanel() {
      const hsv = hexToHsv(params.colors[activeColorIndex - 1]);
      hsvH.value = hsv.h;
      hsvS.value = hsv.s;
      hsvV.value = hsv.v;
    }
    
    function updateActiveColor() {
      const hex = hsvToHex(parseInt(hsvH.value), parseInt(hsvS.value), parseInt(hsvV.value));
      params.colors[activeColorIndex - 1] = hex;
      const dot = document.getElementById(`colorDot${activeColorIndex}`);
      if (dot) dot.style.background = hex;
    }
    
    colorDots.forEach((dot, i) => {
      if (!dot) return;
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        // Update active state
        colorDots.forEach(d => d?.classList.remove('active'));
        dot.classList.add('active');
        activeColorIndex = i + 1;
        // Show HSV panel
        hsvPanel?.classList.add('show');
        updateHSVPanel();
      });
    });
    
    // HSV slider events
    hsvH?.addEventListener('input', updateActiveColor);
    hsvS?.addEventListener('input', updateActiveColor);
    hsvV?.addEventListener('input', updateActiveColor);
    
    // Close HSV panel when clicking elsewhere
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.color-grid') && !e.target.closest('.hsv-panel')) {
        hsvPanel?.classList.remove('show');
        colorDots.forEach(d => d?.classList.remove('active'));
      }
    });
    
    // ============================================
    // RANDOM NOISE CONTROLS
    // ============================================
    document.getElementById('randomAlgo').addEventListener('change', (e) => {
      params.randomAlgo = e.target.value;
    });
    
    document.getElementById('randomScale').addEventListener('input', (e) => {
      params.randomScale = safeParseFloat(e.target.value, 1.4, 0.1, 3.0);
      document.getElementById('randomScaleVal').textContent = params.randomScale.toFixed(1);
    });
    
    document.getElementById('randomIntensity').addEventListener('input', (e) => {
      params.randomIntensity = safeParseFloat(e.target.value, 0.70, 0, 1.0);
      document.getElementById('randomIntensityVal').textContent = params.randomIntensity.toFixed(2);
    });
    
    // Initialize
    updateColorLayers();
    
    // Mouse events
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    canvas.addEventListener('mousedown', () => isMouseDown = true);
    canvas.addEventListener('mouseup', () => isMouseDown = false);
    canvas.addEventListener('mouseleave', () => isMouseDown = false);
    
    // Touch events with preventDefault to stop page scrolling
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isMouseDown = true;
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      isMouseDown = false;
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: false });
    
    // ============================================
    // MAIN LOOP
    // ============================================
    let lastTime = performance.now();
    let frameCount = 0;
    let lastFpsUpdate = performance.now();
    
    function animate() {
      const now = performance.now();
      
      // Clear
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(0, 0, width, height);
      
      // Rebuild spatial grid for this frame
      spatialGrid.rebuild();
      
      // Update and draw particles (using grid for neighbor queries)
      for (let i = 0; i < particles.length; i++) {
        particles[i].update(i);
        particles[i].draw();
      }
      
      // FPS counter (fixed interval, no accumulation)
      frameCount++;
      if (now - lastFpsUpdate >= 1000) {
        document.getElementById('fps').textContent = frameCount;
        document.getElementById('pcount').textContent = particles.length;
        frameCount = 0;
        lastFpsUpdate = now;
      }
      
      // Debug: log grid stats every 5 seconds
      if (performance.now() % 5000 < 20) {
        console.log(`Grid: ${spatialGrid.cols}x${spatialGrid.rows}, cellSize: ${spatialGrid.cellSize.toFixed(1)}px`);
      }
      
      requestAnimationFrame(animate);
    }
    
    // Start
    initHandTracking();
    animate();
  </script>
</body>
