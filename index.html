<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Simulation MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,10,20,0.85);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #0ff;
      min-width: 200px;
    }
    .control-group {
      margin-bottom: 10px;
    }
    .control-group label {
      display: block;
      margin-bottom: 3px;
      color: #fff;
    }
    .control-group input[type="range"] {
      width: 100%;
      cursor: pointer;
    }
    .stats {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      color: #0ff;
    }
    #version {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="info">
    <div class="control-group">
      <label>Particles: <span id="particleCountVal">200</span></label>
      <input type="range" id="particleCount" min="50" max="500" value="200" step="50">
    </div>
    <div class="control-group">
      <label>Particle Size: <span id="radiusVal">1.0</span></label>
      <input type="range" id="radiusScale" min="0.5" max="2.0" value="1.0" step="0.1">
    </div>
    <div class="control-group">
      <label>Viscosity: <span id="viscosityVal">0.15</span></label>
      <input type="range" id="viscosity" min="0" max="0.5" value="0.15" step="0.05">
    </div>
    <div class="control-group">
      <label>Mouse Force: <span id="mouseForceVal">2.0</span></label>
      <input type="range" id="mouseForce" min="0" max="5" value="2" step="0.5">
    </div>
    <div class="stats">Active: <span id="count">0</span> | FPS: <span id="fps">0</span></div>
  </div>
  <div id="version">v0.16</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
