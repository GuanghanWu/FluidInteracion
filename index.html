<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hand Tracking</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: monospace;
      transition: background 0.1s;
      overflow: hidden;
    }
    #container {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,10,20,0.9);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      color: #0ff;
      max-width: 300px;
      z-index: 10;
    }
    button {
      background: #0ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #video {
      width: 160px;
      height: 120px;
      border: 1px solid #0ff;
      display: none;
      margin-top: 10px;
      transform: scaleX(-1); /* 前置摄像头镜像 */
    }
    #log {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      font-size: 11px;
      color: #fff;
      max-height: 150px;
      overflow-y: auto;
    }
    #handInfo {
      margin-top: 5px;
      color: #ff0;
    }
    #version {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #0ff;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="container">
    <button id="startBtn">START CAMERA</button>
    <div>Status: <span id="status">Off</span></div>
    <div id="handInfo">No hand</div>
    <video id="video" playsinline muted></video>
    <canvas id="canvas" width="160" height="120" style="display:none; margin-top:10px; border:1px solid #0ff; transform: scaleX(-1);"></canvas>
    <div id="log"></div>
  </div>
  <div id="version">v0.54 - Draw 21 Hand Points</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <script>
    (function() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('startBtn');
      const statusEl = document.getElementById('status');
      const handInfo = document.getElementById('handInfo');
      const logEl = document.getElementById('log');

      let hands = null;
      let isRunning = false;
      let rafId = null;

      function log(msg) {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        div.textContent = `[${time}] ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      // Setup camera
      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240 },
          audio: false
        });
        video.srcObject = stream;
        return new Promise((resolve) => {
          video.onloadedmetadata = () => resolve(video);
        });
      }

      let resultCount = 0;
      let lastResultTime = Date.now();
      
      // On results
      function onResults(results) {
        resultCount++;
        
        // 绘制视频帧
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.scale(-1, 1);
        ctx.translate(-canvas.width, 0);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        
        // 每30次回调记录一次
        if (resultCount % 30 === 0) {
          const hasMultiHandLandmarks = !!results.multiHandLandmarks;
          const isArray = Array.isArray(results.multiHandLandmarks);
          const length = results.multiHandLandmarks?.length || 0;
          const timeSinceLast = Date.now() - lastResultTime;
          log(`#${resultCount}: hands=${length}, ms=${timeSinceLast}`);
          lastResultTime = Date.now();
        }
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          const landmarks = results.multiHandLandmarks[0];
          
          // 绘制21个关键点
          ctx.fillStyle = '#00ff00';
          for (let i = 0; i < landmarks.length; i++) {
            const x = landmarks[i].x * canvas.width;
            const y = landmarks[i].y * canvas.height;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, 2 * Math.PI);
            ctx.fill();
          }
          
          // 绘制骨骼连线
          const connections = [
            [0,1],[1,2],[2,3],[3,4],           // 拇指
            [0,5],[5,6],[6,7],[7,8],           // 食指
            [0,9],[9,10],[10,11],[11,12],      // 中指
            [0,13],[13,14],[14,15],[15,16],    // 无名指
            [0,17],[17,18],[18,19],[19,20]     // 小指
          ];
          ctx.strokeStyle = '#00ffff';
          ctx.lineWidth = 2;
          for (const [start, end] of connections) {
            ctx.beginPath();
            ctx.moveTo(landmarks[start].x * canvas.width, landmarks[start].y * canvas.height);
            ctx.lineTo(landmarks[end].x * canvas.width, landmarks[end].y * canvas.height);
            ctx.stroke();
          }
          
          const wrist = landmarks[0];
          const x = Math.round(wrist.x * 100);
          const y = Math.round(wrist.y * 100);
          
          handInfo.textContent = `Hand: ${x}%, ${y}% | 21 points`;
          
          const r = Math.round(wrist.x * 255);
          const g = Math.round((1 - wrist.y) * 128);
          const b = Math.round((1 - wrist.x) * 255);
          document.body.style.background = `rgb(${r},${g},${b})`;
          
          if (resultCount % 30 === 0) {
            log(`✓ Hand detected: ${x}%, ${y}%, 21 points drawn`);
          }
        } else {
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
        }
      }

      // Render loop
      let frameCount = 0;
      async function render() {
        if (!isRunning) return;
        
        frameCount++;
        
        if (video.readyState >= 2) {
          if (frameCount % 60 === 0) {
            log(`Sending frame #${frameCount}, readyState=${video.readyState}, video=${video.videoWidth}x${video.videoHeight}`);
          }
          try {
            await hands.send({ image: video });
          } catch (err) {
            log(`ERROR sending frame: ${err.message}`);
          }
        } else {
          if (frameCount % 60 === 0) {
            log(`Video not ready, readyState=${video.readyState}`);
          }
        }
        
        rafId = requestAnimationFrame(render);
      }

      // Start/Stop
      startBtn.addEventListener('click', async () => {
        if (!isRunning) {
          log('Starting...');
          
          try {
            // Setup camera
            await setupCamera();
            video.play();
            video.style.display = 'block';
            canvas.style.display = 'block';
            log(`Camera: ${video.videoWidth}x${video.videoHeight}`);

            // Init hands with selfie mode for front camera
            log('Creating Hands instance...');
            hands = new Hands({
              locateFile: (file) => {
                log(`Loading model file: ${file}`);
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
              }
            });
            log('Hands instance created');
            
            log('Setting options...');
            hands.setOptions({
              maxNumHands: 1,
              modelComplexity: 1,
              minDetectionConfidence: 0.2,
              minTrackingConfidence: 0.2
            });
            log('Options set (threshold=0.2)');
            
            log('Registering onResults callback...');
            hands.onResults(onResults);
            log('Callback registered');
            
            isRunning = true;
            statusEl.textContent = 'Running';
            statusEl.style.color = '#0f0';
            startBtn.textContent = 'STOP';
            
            // Start render loop
            render();
            log('Started! Show your hand');
            
          } catch (err) {
            log('ERROR: ' + err.message);
            statusEl.textContent = 'Error';
            statusEl.style.color = '#f00';
          }
        } else {
          log('Stopping...');
          isRunning = false;
          if (rafId) cancelAnimationFrame(rafId);
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
          }
          hands = null;
          video.style.display = 'none';
          canvas.style.display = 'none';
          statusEl.textContent = 'Off';
          statusEl.style.color = '#fff';
          startBtn.textContent = 'START CAMERA';
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
          log('Stopped');
        }
      });

      log('Ready - Click START CAMERA');
    })();
  </script>
</body>
</html>
