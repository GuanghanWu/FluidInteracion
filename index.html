<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Hand Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #000;
      transition: background 0.1s ease;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0,10,20,0.9);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #0ff;
      z-index: 100;
    }
    #controls label {
      display: block;
      margin-bottom: 10px;
      cursor: pointer;
    }
    #controls input[type="checkbox"] {
      margin-right: 8px;
    }
    #info {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      color: #fff;
      font-size: 12px;
    }
    #cameraPreview {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 160px;
      height: 120px;
      border: 2px solid #0ff;
      border-radius: 8px;
      overflow: hidden;
      display: none;
      z-index: 100;
    }
    #cameraPreview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #version {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label>
      <input type="checkbox" id="cameraToggle"> Camera
    </label>
    <div id="info">
      <div>Status: <span id="status">Off</span></div>
      <div>Hand: <span id="handPos">--</span></div>
      <div>BG: <span id="bgColor">#000000</span></div>
    </div>
  </div>

  <div id="cameraPreview">
    <video id="previewVideo" autoplay playsinline muted></video>
  </div>

  <div id="version">v0.50 - Camera + Hand Tracking</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
