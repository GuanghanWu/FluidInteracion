<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hand Tracking</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: monospace;
      transition: background 0.1s;
      overflow: hidden;
    }
    #container {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,10,20,0.9);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      color: #0ff;
      max-width: 300px;
      z-index: 10;
    }
    button {
      background: #0ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #video {
      width: 160px;
      height: 120px;
      border: 1px solid #0ff;
      display: none;
      margin-top: 10px;
      transform: scaleX(-1);
    }
    #log {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      font-size: 11px;
      color: #fff;
      max-height: 150px;
      overflow-y: auto;
    }
    #handInfo {
      margin-top: 5px;
      color: #ff0;
    }
    #version {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #0ff;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="container">
    <button id="startBtn">START CAMERA</button>
    <div>Status: <span id="status">Off</span></div>
    <div id="handInfo">No hand</div>
    <video id="video" playsinline muted></video>
    <div id="log"></div>
  </div>
  <div id="version">v0.53 - requestAnimationFrame</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <script>
    (function() {
      const video = document.getElementById('video');
      const startBtn = document.getElementById('startBtn');
      const statusEl = document.getElementById('status');
      const handInfo = document.getElementById('handInfo');
      const logEl = document.getElementById('log');

      let hands = null;
      let isRunning = false;
      let rafId = null;

      function log(msg) {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        div.textContent = `[${time}] ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      // Setup camera
      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240 },
          audio: false
        });
        video.srcObject = stream;
        return new Promise((resolve) => {
          video.onloadedmetadata = () => resolve(video);
        });
      }

      // On results
      function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          const landmarks = results.multiHandLandmarks[0];
          const wrist = landmarks[0];
          const x = Math.round(wrist.x * 100);
          const y = Math.round(wrist.y * 100);
          
          handInfo.textContent = `Hand: ${x}%, ${y}%`;
          
          const r = Math.round(wrist.x * 255);
          const g = Math.round((1 - wrist.y) * 128);
          const b = Math.round((1 - wrist.x) * 255);
          document.body.style.background = `rgb(${r},${g},${b})`;
        } else {
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
        }
      }

      // Render loop
      async function render() {
        if (!isRunning) return;
        
        if (video.readyState >= 2) {
          await hands.send({ image: video });
        }
        
        rafId = requestAnimationFrame(render);
      }

      // Start/Stop
      startBtn.addEventListener('click', async () => {
        if (!isRunning) {
          log('Starting...');
          
          try {
            // Setup camera
            await setupCamera();
            video.play();
            video.style.display = 'block';
            log(`Camera: ${video.videoWidth}x${video.videoHeight}`);

            // Init hands
            hands = new Hands({
              locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            
            hands.setOptions({
              maxNumHands: 1,
              modelComplexity: 1,
              minDetectionConfidence: 0.5,
              minTrackingConfidence: 0.5
            });
            
            hands.onResults(onResults);
            
            isRunning = true;
            statusEl.textContent = 'Running';
            statusEl.style.color = '#0f0';
            startBtn.textContent = 'STOP';
            
            // Start render loop
            render();
            log('Started! Show your hand');
            
          } catch (err) {
            log('ERROR: ' + err.message);
            statusEl.textContent = 'Error';
            statusEl.style.color = '#f00';
          }
        } else {
          log('Stopping...');
          isRunning = false;
          if (rafId) cancelAnimationFrame(rafId);
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
          }
          hands = null;
          video.style.display = 'none';
          statusEl.textContent = 'Off';
          statusEl.style.color = '#fff';
          startBtn.textContent = 'START CAMERA';
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
          log('Stopped');
        }
      });

      log('Ready - Click START CAMERA');
    })();
  </script>
</body>
</html>
