<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Simulation MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
    }
    #version {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="info">
    Particles: <span id="count">0</span><br>
    FPS: <span id="fps">0</span><br>
    Click/Drag to interact
  </div>
  <div id="version">v0.06</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
