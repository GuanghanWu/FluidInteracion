<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hand Tracking - TensorFlow.js</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: monospace;
      transition: background 0.1s;
      overflow: hidden;
    }
    #container {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,10,20,0.9);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      color: #0ff;
      max-width: 300px;
      z-index: 10;
    }
    button {
      background: #0ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:disabled {
      background: #666;
      color: #999;
      cursor: not-allowed;
    }
    #loadingStatus {
      color: #ff0;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #0ff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 5px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #canvas {
      width: 160px;
      height: 120px;
      border: 1px solid #0ff;
      display: none;
      margin-top: 10px;
    }
    #log {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      font-size: 11px;
      color: #fff;
      max-height: 150px;
      overflow-y: auto;
    }
    #handInfo {
      margin-top: 5px;
      color: #ff0;
    }
    #version {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #0ff;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="loadingStatus"><span class="spinner"></span>Loading libraries...</div>
    <button id="startBtn" disabled>START CAMERA</button>
    <div>Status: <span id="status">Off</span></div>
    <div id="handInfo">No hand</div>
    <canvas id="canvas" width="160" height="120"></canvas>
    <div id="log"></div>
  </div>
  <div id="version">v0.62 - Stable Load</div>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js"></script>
  
  <script>
    (function() {
      // 隐藏的视频元素
      const video = document.createElement('video');
      video.setAttribute('playsinline', '');
      video.setAttribute('muted', '');
      video.style.display = 'none';
      document.body.appendChild(video);
      
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('startBtn');
      const statusEl = document.getElementById('status');
      const handInfo = document.getElementById('handInfo');
      const logEl = document.getElementById('log');
      const loadingStatus = document.getElementById('loadingStatus');

      let model = null;
      let isRunning = false;
      let rafId = null;

      function log(msg) {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        div.textContent = `[${time}] ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      // Check if libraries loaded
      function checkLibraries() {
        if (typeof tf === 'undefined') {
          log('ERROR: TensorFlow.js not loaded');
          return false;
        }
        if (typeof handpose === 'undefined') {
          log('ERROR: Handpose not loaded');
          return false;
        }
        log('Libraries loaded: tf=' + tf.version.tfjs + ', handpose=' + (handpose.version || 'unknown'));
        return true;
      }

      // Setup camera
      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240 },
          audio: false
        });
        video.srcObject = stream;
        return new Promise((resolve) => {
          video.onloadedmetadata = () => resolve(video);
        });
      }

      // Detect and draw
      async function detect() {
        if (!isRunning || !model) return;

        // Draw video (镜像)
        ctx.save();
        ctx.scale(-1, 1);
        ctx.translate(-canvas.width, 0);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        // Detect hands
        const predictions = await model.estimateHands(video);

        if (predictions.length > 0) {
          const hand = predictions[0];
          const landmarks = hand.landmarks;
          const palmBase = landmarks[0];
          
          // Draw landmarks (镜像坐标)
          ctx.fillStyle = '#00ff00';
          for (let i = 0; i < landmarks.length; i++) {
            const x = landmarks[i][0] * (canvas.width / video.videoWidth);
            const y = landmarks[i][1] * (canvas.height / video.videoHeight);
            ctx.beginPath();
            ctx.arc(canvas.width - x, y, 3, 0, 2 * Math.PI);
            ctx.fill();
          }

          const x = Math.round((palmBase[0] / video.videoWidth) * 100);
          const y = Math.round((palmBase[1] / video.videoHeight) * 100);
          handInfo.textContent = `Hand: ${x}%, ${y}%`;

          const r = Math.round((palmBase[0] / video.videoWidth) * 255);
          const g = Math.round((1 - palmBase[1] / video.videoHeight) * 128);
          const b = Math.round((1 - palmBase[0] / video.videoWidth) * 255);
          document.body.style.background = `rgb(${r},${g},${b})`;
        } else {
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
        }

        rafId = requestAnimationFrame(detect);
      }

      // Start/Stop
      startBtn.addEventListener('click', async () => {
        if (!model) {
          log('Please wait for model to load');
          return;
        }
        
        if (!isRunning) {
          log('Starting...');
          
          try {
            // Setup camera
            await setupCamera();
            video.play();
            canvas.style.display = 'block';
            log(`Camera: ${video.videoWidth}x${video.videoHeight}`);
            
            isRunning = true;
            statusEl.textContent = 'Running';
            statusEl.style.color = '#0f0';
            startBtn.textContent = 'STOP';
            
            // Start detection
            detect();
            log('Started! Show your hand');
            
          } catch (err) {
            log('ERROR: ' + err.message);
            console.error(err);
            statusEl.textContent = 'Error';
            statusEl.style.color = '#f00';
          }
        } else {
          log('Stopping...');
          isRunning = false;
          if (rafId) cancelAnimationFrame(rafId);
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
          }
          canvas.style.display = 'none';
          statusEl.textContent = 'Off';
          statusEl.style.color = '#fff';
          startBtn.textContent = 'START CAMERA';
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
          log('Stopped');
        }
      });

      // Wait for page to fully load, then load model
      async function init() {
        // Wait a bit for CDN scripts to execute
        await new Promise(r => setTimeout(r, 500));
        
        if (!checkLibraries()) {
          loadingStatus.innerHTML = '✗ Libraries failed to load';
          loadingStatus.style.color = '#f00';
          return;
        }
        
        loadingStatus.innerHTML = '<span class="spinner"></span>Loading model...';
        
        try {
          log('Loading model...');
          const startTime = Date.now();
          model = await handpose.load();
          const loadTime = Date.now() - startTime;
          log(`Model loaded in ${loadTime}ms`);
          
          startBtn.disabled = false;
          loadingStatus.innerHTML = '✓ Model ready';
          loadingStatus.style.color = '#0f0';
          
        } catch (err) {
          log('ERROR loading model: ' + err.message);
          loadingStatus.innerHTML = '✗ Failed: ' + err.message;
          loadingStatus.style.color = '#f00';
        }
      }
      
      init();
    })();
  </script>
</body>
