<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Simulation MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,10,20,0.85);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #0ff;
      min-width: 220px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .control-group {
      margin-bottom: 10px;
    }
    .control-group label {
      display: block;
      margin-bottom: 3px;
      color: #fff;
    }
    .control-group input[type="range"] {
      width: 100%;
      cursor: pointer;
    }
    .control-group input[type="color"] {
      width: 100%;
      height: 30px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
    }
    .stats {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      color: #0ff;
    }
    #version {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #0ff;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 3px;
    }
    /* 折叠页样式 */
    .accordion {
      margin-bottom: 10px;
    }
    .accordion-header {
      background: rgba(0, 80, 100, 0.5);
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .accordion-header:hover {
      background: rgba(0, 100, 120, 0.6);
    }
    .accordion-header::after {
      content: '▼';
      font-size: 10px;
    }
    .accordion-header.collapsed::after {
      content: '▶';
    }
    .accordion-content {
      padding: 10px;
      display: block;
    }
    .accordion-content.collapsed {
      display: none;
    }
    .color-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .color-row label {
      flex: 1;
      font-size: 11px;
    }
    /* HSV 颜色选择器 - 紧凑版 */
    .color-hsv {
      padding: 8px;
      background: rgba(0, 30, 40, 0.5);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .color-hsv label {
      font-size: 10px;
      margin-bottom: 4px;
    }
    .hsv-row {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .hsv-row input[type="range"] {
      flex: 1;
      height: 16px;
    }
    .color-preview {
      width: 100%;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    /* 面板折叠 */
    #panelContent.collapsed {
      display: none;
    }
    #info.collapsed {
      min-width: auto;
      padding: 10px 15px;
    }
    #panelToggle {
      transition: transform 0.2s;
    }
    #panelToggle.collapsed {
      transform: rotate(-90deg);
    }
  </style>
</head>
<body>
  <div id="info">
    <!-- 面板折叠按钮 -->
    <div id="panelToggle" style="position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 14px; color: #0ff;">▼</div>
    
    <!-- 面板内容 -->
    <div id="panelContent">
    <!-- 基础参数 -->
    <div class="control-group">
      <label>Density: <span id="densityVal">1.0x</span></label>
      <input type="range" id="density" min="0.5" max="5.0" value="1.0" step="0.1" title="Max 5x ≈ 1500 particles">
    </div>
    <div class="control-group">
      <label>Particle Size: <span id="radiusVal">1.0</span></label>
      <input type="range" id="radiusScale" min="0.3" max="4.0" value="1.0" step="0.1">
    </div>
    
    <!-- 物理参数折叠页 -->
    <div class="accordion">
      <div class="accordion-header collapsed" data-accordion="physics">Physics</div>
      <div class="accordion-content collapsed" id="physics">
        <div class="control-group">
          <label>Viscosity: <span id="viscosityVal">0.15</span></label>
          <input type="range" id="viscosity" min="0" max="0.5" value="0.15" step="0.05">
        </div>
        <div class="control-group">
          <label>Mouse Force: <span id="mouseForceVal">2.0</span></label>
          <input type="range" id="mouseForce" min="0" max="5" value="2" step="0.5">
        </div>
      </div>
    </div>
    
    <!-- 视觉效果折叠页 -->
    <div class="accordion">
      <div class="accordion-header collapsed" data-accordion="visual">Visual</div>
      <div class="accordion-content collapsed" id="visual">
        <div class="control-group">
          <label>Edge Softness: <span id="edgeSoftnessVal">0.5</span></label>
          <input type="range" id="edgeSoftness" min="0.1" max="1.0" value="0.5" step="0.1">
        </div>
        <div class="control-group">
          <label>Color Layers: <span id="colorLayersVal">4</span></label>
          <input type="range" id="colorLayers" min="2" max="6" value="4" step="1">
        </div>
        <div class="control-group">
          <label>Center Darkness: <span id="centerDarkVal">0.2</span></label>
          <input type="range" id="centerDark" min="0.05" max="0.5" value="0.2" step="0.05">
        </div>
        <div class="control-group">
          <label>Edge Brightness: <span id="edgeBrightVal">1.5</span></label>
          <input type="range" id="edgeBright" min="1.0" max="2.0" value="1.5" step="0.1">
        </div>
      </div>
    </div>
    
    <!-- 颜色折叠页 -->
    <div class="accordion">
      <div class="accordion-header collapsed" data-accordion="colors">Colors</div>
      <div class="accordion-content collapsed" id="colors">
        <div class="control-group color-hsv">
          <label>Base Color (H/S/V)</label>
          <div class="hsv-row">
            <input type="range" id="baseColorH" min="0" max="360" value="195" title="Hue">
            <input type="range" id="baseColorS" min="0" max="100" value="100" title="Saturation">
            <input type="range" id="baseColorV" min="0" max="100" value="100" title="Value">
          </div>
          <div class="color-preview" id="baseColorPreview" style="background: #00ccff;"></div>
        </div>
        <div class="control-group color-hsv">
          <label>Center Color (H/S/V)</label>
          <div class="hsv-row">
            <input type="range" id="centerColorH" min="0" max="360" value="210" title="Hue">
            <input type="range" id="centerColorS" min="0" max="100" value="100" title="Saturation">
            <input type="range" id="centerColorV" min="0" max="100" value="20" title="Value">
          </div>
          <div class="color-preview" id="centerColorPreview" style="background: #001133;"></div>
        </div>
        <div class="control-group color-hsv">
          <label>Edge Color (H/S/V)</label>
          <div class="hsv-row">
            <input type="range" id="edgeColorH" min="0" max="360" value="180" title="Hue">
            <input type="range" id="edgeColorS" min="0" max="100" value="100" title="Saturation">
            <input type="range" id="edgeColorV" min="0" max="100" value="100" title="Value">
          </div>
          <div class="color-preview" id="edgeColorPreview" style="background: #66ffff;"></div>
        </div>
      </div>
    </div>
    
    <!-- Profile 折叠页 -->
    <div class="accordion">
      <div class="accordion-header collapsed" data-accordion="profile">Profile</div>
      <div class="accordion-content collapsed" id="profile">
        <div class="control-group">
          <label>FPS Limit: <span id="fpsLimitVal">120</span></label>
          <select id="fpsLimit" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #0ff; border: 1px solid #0ff; border-radius: 4px;">
            <option value="30">30 FPS</option>
            <option value="60">60 FPS</option>
            <option value="120" selected>120 FPS</option>
          </select>
        </div>
      </div>
    </div>
    
    <div class="stats">Active: <span id="count">0</span> | FPS: <span id="fps">0</span></div>
    </div>
  </div>
  <div id="version">v0.34</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
