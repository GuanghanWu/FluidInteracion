<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hand Tracking</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: monospace;
      transition: background 0.1s;
    }
    #container {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,10,20,0.9);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      color: #0ff;
      max-width: 300px;
    }
    button {
      background: #0ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #video {
      width: 160px;
      height: 120px;
      border: 1px solid #0ff;
      display: none;
      margin-top: 10px;
      transform: scaleX(-1); /* 镜像 */
    }
    #log {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      font-size: 11px;
      color: #fff;
      max-height: 200px;
      overflow-y: auto;
    }
    #handInfo {
      margin-top: 5px;
      color: #ff0;
    }
    #version {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #0ff;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="container">
    <button id="startBtn">START CAMERA</button>
    <div>Status: <span id="status">Off</span></div>
    <div id="handInfo">No hand</div>
    <video id="video" playsinline></video>
    <div id="log"></div>
  </div>
  <div id="version">v0.52-fix - All-in-One</div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <!-- All code inline -->
  <script>
    (function() {
      const videoElement = document.getElementById('video');
      const startBtn = document.getElementById('startBtn');
      const statusEl = document.getElementById('status');
      const handInfo = document.getElementById('handInfo');
      const logEl = document.getElementById('log');

      let hands;
      let camera;

      function log(msg) {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        div.textContent = `[${time}] ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      // Check libraries
      log('Checking libraries...');
      if (typeof Hands === 'undefined') {
        log('ERROR: Hands not loaded');
      } else {
        log('Hands OK');
      }
      if (typeof Camera === 'undefined') {
        log('ERROR: Camera not loaded');
      } else {
        log('Camera OK');
      }

      let frameCount = 0;
      let lastHandTime = 0;
      
      function onResults(results) {
        frameCount++;
        
        // 检查是否有手
        const hasHand = results.multiHandLandmarks && 
                        Array.isArray(results.multiHandLandmarks) && 
                        results.multiHandLandmarks.length > 0;
        
        // 每30帧记录一次
        if (frameCount % 30 === 0) {
          const handCount = hasHand ? results.multiHandLandmarks.length : 0;
          log(`Frame ${frameCount}: ${handCount} hand(s)`);
        }
        
        if (hasHand) {
          const landmarks = results.multiHandLandmarks[0];
          if (landmarks && landmarks[0]) {
            const wrist = landmarks[0];
            const x = Math.round(wrist.x * 100);
            const y = Math.round(wrist.y * 100);
            
            handInfo.textContent = `Hand: ${x}%, ${y}%`;
            lastHandTime = Date.now();
            
            const r = Math.round(wrist.x * 255);
            const g = Math.round((1 - wrist.y) * 128);
            const b = Math.round((1 - wrist.x) * 255);
            document.body.style.background = `rgb(${r},${g},${b})`;
            
            if (frameCount % 30 === 0) {
              log(`Detected at ${x}%, ${y}%`);
            }
          }
        } else {
          // 只有在超过500ms没检测到手才显示"No hand"
          if (Date.now() - lastHandTime > 500) {
            handInfo.textContent = 'No hand';
            document.body.style.background = '#000';
          }
        }
      }

      startBtn.addEventListener('click', async () => {
        if (!camera) {
          log('START clicked');
          
          if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
            log('ERROR: Libraries not ready');
            return;
          }
          
          try {
            hands = new Hands({locateFile: (file) => {
              return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
              maxNumHands: 1,
              modelComplexity: 0,  // 轻量级
              minDetectionConfidence: 0.3,  // 降低阈值
              minTrackingConfidence: 0.3
            });
            
            hands.onResults(onResults);
            
            log('Creating camera...');
            camera = new Camera(videoElement, {
              onFrame: async () => {
                await hands.send({image: videoElement});
              },
              width: 320,
              height: 240
            });
            
            log('Starting...');
            await camera.start();
            
            // 检查视频尺寸
            log(`Video: ${videoElement.videoWidth}x${videoElement.videoHeight}`);
            
            statusEl.textContent = 'Running';
            statusEl.style.color = '#0f0';
            videoElement.style.display = 'block';
            startBtn.textContent = 'STOP';
            log('Started!');
            
          } catch (err) {
            log('ERROR: ' + err.message);
            console.error(err);
            statusEl.textContent = 'Error';
            statusEl.style.color = '#f00';
          }
        } else {
          log('STOP clicked');
          camera.stop();
          hands.close();
          camera = null;
          hands = null;
          statusEl.textContent = 'Off';
          statusEl.style.color = '#fff';
          videoElement.style.display = 'none';
          startBtn.textContent = 'START CAMERA';
          handInfo.textContent = 'No hand';
          document.body.style.background = '#000';
          log('Stopped');
        }
      });
      
      log('Ready - Click START CAMERA');
    })();
  </script>
</body>
</html>
