<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hand Tracking</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: monospace;
      transition: background 0.1s;
    }
    #container {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,10,20,0.9);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      color: #0ff;
      max-width: 300px;
    }
    button {
      background: #0ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #video {
      width: 160px;
      height: 120px;
      border: 1px solid #0ff;
      display: none;
      margin-top: 10px;
    }
    #log {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #0ff;
      font-size: 11px;
      color: #fff;
      max-height: 200px;
      overflow-y: auto;
    }
    #handInfo {
      margin-top: 5px;
      color: #ff0;
    }
    #version {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #0ff;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="container">
    <button id="startBtn">START CAMERA</button>
    <div>Status: <span id="status">Off</span></div>
    <div id="handInfo">No hand</div>
    <video id="video" playsinline></video>
    <div id="log"></div>
  </div>
  <div id="version">v0.51 - Official MediaPipe</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script>
    // 内联检查脚本
    const log = document.getElementById('log');
    function addLog(msg) {
      const div = document.createElement('div');
      div.textContent = msg;
      log.appendChild(div);
    }
    
    addLog('Page loaded');
    
    // 检查库
    if (typeof Hands === 'undefined') {
      addLog('ERROR: Hands library not loaded');
    } else {
      addLog('Hands library OK');
    }
    
    if (typeof Camera === 'undefined') {
      addLog('ERROR: Camera library not loaded');
    } else {
      addLog('Camera library OK');
    }
    
    // 检查按钮
    const btn = document.getElementById('startBtn');
    if (btn) {
      addLog('Button found');
    } else {
      addLog('ERROR: Button not found');
    }
  </script>
  <script>
    try {
      addLog('Loading main.js...');
    } catch(e) {
      console.error(e);
    }
  </script>
  <script src="./src/main.js" onload="addLog('main.js loaded')" onerror="addLog('ERROR: main.js failed to load')"></script>
  <script>
    try {
      addLog('After main.js load attempt');
    } catch(e) {
      console.error(e);
    }
  </script>
</body>
</html>
