<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluid Simulation v1.3 - Metaball + Hand Tracking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #controls { position: absolute; top: 10px; left: 10px; background: rgba(0,10,20,0.9); border: 1px solid #0ff; border-radius: 8px; padding: 15px; color: #0ff; font-family: monospace; font-size: 12px; min-width: 260px; max-height: 90vh; overflow-y: auto; z-index: 100; }
    #panelToggle { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 14px; color: #0ff; transition: transform 0.2s; }
    #panelToggle.collapsed { transform: rotate(-90deg); }
    #panelContent.collapsed { display: none; }
    #controls.collapsed { min-width: auto; padding: 10px 15px; }
    .control-group { margin-bottom: 10px; }
    .control-group label { display: block; margin-bottom: 3px; color: #fff; font-size: 11px; }
    .control-group input[type="range"] { width: 100%; cursor: pointer; }
    .accordion { margin-bottom: 10px; border: 1px solid rgba(0,255,255,0.3); border-radius: 4px; }
    .accordion-header { background: rgba(0,80,100,0.5); padding: 8px; cursor: pointer; display: flex; justify-content: space-between; }
    .accordion-header::after { content: '▼'; font-size: 10px; }
    .accordion-header.collapsed::after { content: '▶'; }
    .accordion-content { padding: 10px; }
    .accordion-content.collapsed { display: none; }
    .sub-accordion { margin: 6px 0; border-left: 2px solid rgba(0,255,255,0.3); padding-left: 8px; }
    .sub-header { font-size: 11px; color: #0ff; cursor: pointer; padding: 4px 0; display: flex; justify-content: space-between; opacity: 0.8; }
    .sub-header:hover { opacity: 1; }
    .sub-header::after { content: '▼'; font-size: 8px; }
    .sub-header.collapsed::after { content: '▶'; }
    .sub-content { display: block; padding: 4px 0 4px 8px; }
    .sub-content.collapsed { display: none; }
    .sub-control { margin-bottom: 6px; }
    .sub-control label { font-size: 10px; color: #aaa; margin-bottom: 2px; display: block; }
    .sub-control input[type="range"] { width: 100%; height: 12px; }
    .sub-control select { width: 100%; padding: 3px 6px; background: rgba(0,0,0,0.5); color: #0ff; border: 1px solid rgba(0,255,255,0.3); border-radius: 3px; font-size: 10px; }
    .color-grid { display: flex; gap: 6px; margin: 6px 0; }
    .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; transition: all 0.2s; }
    .color-dot:hover { transform: scale(1.1); border-color: #0ff; }
    .color-dot.active { border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.5); }
    .color-dot.hidden { display: none; }
    .hsv-panel { display: none; padding: 8px; background: rgba(0,30,40,0.8); border-radius: 4px; margin-top: 8px; border: 1px solid rgba(0,255,255,0.3); }
    .hsv-panel.show { display: block; }
    .hsv-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .hsv-row span { width: 16px; font-size: 10px; color: #0ff; text-align: center; }
    .hsv-row input[type="range"] { flex: 1; height: 14px; }
    .toggle-container { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
    .toggle-switch { position: relative; width: 40px; height: 20px; background: #333; border-radius: 10px; transition: background 0.3s; }
    .toggle-switch.active { background: #0f0; }
    .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.3s; }
    .toggle-switch.active::after { transform: translateX(20px); }
    #cameraPreview { width: 150px; height: 150px; border: 1px solid #0ff; display: none; margin: 10px auto; }
    #cameraCanvas { width: 100%; height: 100%; }
    #handPos { margin-top: 8px; color: #ff0; font-size: 11px; text-align: center; }
    #loadingStatus { color: #ff0; font-size: 11px; margin-bottom: 8px; text-align: center; }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #0ff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 10px; padding-top: 10px; border-top: 1px solid #0ff; color: #fff; font-size: 11px; }
    #version { position: absolute; bottom: 10px; right: 10px; color: #0ff; font-size: 11px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 3px; z-index: 100; }
  </style>
</head>
<body>
  <div id="controls">
    <div id="panelToggle">▼</div>
    <div id="panelContent">
      <div id="loadingStatus"><span class="spinner"></span>Loading...</div>
      <div class="control-group"><label>Density: <span id="densityVal">2.6</span>x</label><input type="range" id="density" min="0.5" max="5.0" value="2.6" step="0.1"></div>
      <div class="control-group"><label>Particle Size: <span id="radiusVal">1.4</span></label><input type="range" id="radiusScale" min="0.3" max="4.0" value="1.4" step="0.1"></div>
      <div class="accordion"><div class="accordion-header collapsed" data-target="physics">Physics</div><div class="accordion-content collapsed" id="physics"><div class="control-group"><label>Viscosity: <span id="viscosityVal">0.25</span></label><input type="range" id="viscosity" min="0" max="0.5" value="0.25" step="0.05"></div><div class="control-group"><label>Mouse Force: <span id="mouseForceVal">4.0</span></label><input type="range" id="mouseForce" min="0" max="5" value="4.0" step="0.5"></div></div></div>
      <div class="accordion"><div class="accordion-header collapsed" data-target="visual">Visual</div><div class="accordion-content collapsed" id="visual">
        <div class="sub-accordion"><div class="sub-header collapsed" data-sub="colors">Colors</div><div class="sub-content collapsed" id="colors"><div class="sub-control"><label>Layers: <span id="colorLayersVal">4</span></label><input type="range" id="colorLayers" min="1" max="4" value="4" step="1"></div><div class="color-grid"><div class="color-dot active" id="colorDot1" style="background:#66ffff" title="Color1"></div><div class="color-dot" id="colorDot2" style="background:#00ccff" title="Color2"></div><div class="color-dot" id="colorDot3" style="background:#0088cc" title="Color3"></div><div class="color-dot" id="colorDot4" style="background:#001133" title="Color4"></div></div><div class="hsv-panel" id="hsvPanel"><div class="hsv-row"><span>H</span><input type="range" id="hsvH" min="0" max="360" value="180"></div><div class="hsv-row"><span>S</span><input type="range" id="hsvS" min="0" max="100" value="100"></div><div class="hsv-row"><span>V</span><input type="range" id="hsvV" min="0" max="100" value="100"></div></div></div></div>
        <div class="sub-accordion"><div class="sub-header collapsed" data-sub="random">Random</div><div class="sub-content collapsed" id="random"><div class="sub-control"><label>Algorithm</label><select id="randomAlgo"><option value="none">None</option><option value="perlin" selected>Perlin</option><option value="simplex">Simplex</option><option value="white">White</option></select></div><div class="sub-control"><label>Scale:<span id="randomScaleVal">1.4</span></label><input type="range" id="randomScale" min="0.1" max="3.0" value="1.4" step="0.1"></div><div class="sub-control"><label>Intensity:<span id="randomIntensityVal">0.70</span></label><input type="range" id="randomIntensity" min="0" max="1.0" value="0.70" step="
